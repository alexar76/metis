# Hybrid test config: LM Studio (local phi-4) + DeepSeek v4-pro / v4-flash (cloud)
# API keys via env vars only — never commit .env
production: false
default_route: council

# Fallback defaults — LM Studio local
provider: openai_compat
base_model: phi-4-reasoning-plus  # placeholder — or qwen from LM Studio; see GET /v1/models
base_url: http://localhost:1234/v1
api_key: lm-studio

# Lighter settings for local smoke tests
enable_web_search: false
enable_code_interpreter: false
enforce_confidence_gate: false

# Economy metering — cache-miss input rates (official DeepSeek pricing, 2026-07)
economy:
  enabled: true
  currency: USD
  models:
    deepseek-v4-flash:
      input_per_1m: 0.14
      output_per_1m: 0.28
      provider_label: deepseek
    deepseek-v4-pro:
      input_per_1m: 0.435
      output_per_1m: 0.87
      provider_label: deepseek
    phi-4-reasoning-plus:
      input_per_1m: 0
      output_per_1m: 0
      provider_label: local

modules:
  # --- Intent parsers (diverse model+endpoint per role) ---
  intent_parser_a:
    provider: openai_compat
    model: deepseek-v4-flash
    base_url: https://api.deepseek.com/v1
    api_key_env: DEEPSEEK_API_KEY
    temperature: 0.5

  intent_parser_b:
    provider: openai_compat
    # LM Studio — phi-4 or qwen; adjust id after loading weights:
    #   curl http://localhost:1234/v1/models
    model: phi-4-reasoning-plus
    base_url: http://localhost:1234/v1
    api_key_env: LMSTUDIO_API_KEY
    temperature: 0.7

  intent_parser_c:
    provider: openai_compat
    model: deepseek-v4-pro
    base_url: https://api.deepseek.com/v1
    api_key_env: DEEPSEEK_API_KEY
    temperature: 0.9

  # --- Council support (fast flash vs local) ---
  constraint_extractor:
    provider: openai_compat
    model: deepseek-v4-flash
    base_url: https://api.deepseek.com/v1
    api_key_env: DEEPSEEK_API_KEY
    temperature: 0.3

  ambiguity_hunter:
    provider: openai_compat
    model: deepseek-v4-flash
    base_url: https://api.deepseek.com/v1
    api_key_env: DEEPSEEK_API_KEY

  red_team:
    provider: openai_compat
    model: deepseek-v4-pro
    base_url: https://api.deepseek.com/v1
    api_key_env: DEEPSEEK_API_KEY
    temperature: 0.6

  synthesizer:
    provider: openai_compat
    model: deepseek-v4-pro
    base_url: https://api.deepseek.com/v1
    api_key_env: DEEPSEEK_API_KEY
    temperature: 0.3

  judge:
    provider: openai_compat
    model: deepseek-v4-flash  # fast verify
    base_url: https://api.deepseek.com/v1
    api_key_env: DEEPSEEK_API_KEY
    temperature: 0.1

  # --- MoA layer 1 (pro depth + flash pragmatism) ---
  moa_proposer_logician:
    provider: openai_compat
    model: deepseek-v4-pro
    base_url: https://api.deepseek.com/v1
    api_key_env: DEEPSEEK_API_KEY
    temperature: 0.7

  moa_proposer_pragmatist:
    provider: openai_compat
    model: deepseek-v4-flash
    base_url: https://api.deepseek.com/v1
    api_key_env: DEEPSEEK_API_KEY
    temperature: 0.7

  moa_proposer_skeptic:
    provider: openai_compat
    model: deepseek-v4-flash
    base_url: https://api.deepseek.com/v1
    api_key_env: DEEPSEEK_API_KEY
    temperature: 0.7

  moa_refiner:
    provider: openai_compat
    model: deepseek-v4-pro
    base_url: https://api.deepseek.com/v1
    api_key_env: DEEPSEEK_API_KEY

  moa_aggregator:
    provider: openai_compat
    model: deepseek-v4-flash
    base_url: https://api.deepseek.com/v1
    api_key_env: DEEPSEEK_API_KEY

  # --- Router (fast classification) ---
  router:
    provider: openai_compat
    model: deepseek-v4-flash
    base_url: https://api.deepseek.com/v1
    api_key_env: DEEPSEEK_API_KEY
    temperature: 0.1
