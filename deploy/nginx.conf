# Metis node reverse proxy — metis.modelmarket.dev + skopos.modelmarket.dev
#
# Canonical config mounted into `metis-nginx` (nginx:alpine, :80/:443):
#
#   docker run -d --name metis-nginx --restart unless-stopped \
#     --network metisnet -p 80:80 -p 443:443 \
#     -v /var/www/metis-landing:/usr/share/nginx/html:ro \
#     -v /opt/metis/deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro \
#     -v /var/www/certbot:/var/www/certbot:ro \
#     -v /opt/metis/deploy/letsencrypt:/etc/letsencrypt:ro \
#     nginx:alpine
#
# Upstreams on `metisnet`:
#   metis:8080           — Metis API (metis.modelmarket.dev)
#   metis-skopos:8501    — SKOPOS Streamlit UI (skopos.modelmarket.dev)
#   metis-skopos:8502    — SKOPOS public GET /healthz
#
# SKOPOS container must be on metisnet: see metis/deploy/skopos-test/docker-compose.yml
# TLS: certbot webroot — see deploy/README.md

limit_req_zone $binary_remote_addr zone=metis_api:10m rate=120r/m;

# --- HTTP: domain -> redirect to HTTPS (ACME challenge kept reachable) ---
server {
  listen 80;
  server_name metis.modelmarket.dev;
  location /.well-known/acme-challenge/ { root /var/www/certbot; }
  location / { return 301 https://$host$request_uri; }
}

# --- HTTP: bare IP / anything else -> serve over HTTP ---
server {
  listen 80 default_server;
  server_name _;
  location /.well-known/acme-challenge/ { root /var/www/certbot; }
  root /usr/share/nginx/html;
  index index.html;
  location / { try_files $uri $uri/ /index.html; }
  # Live cognition trace (SSE) — must NOT buffer, or council runs (8-15s) are
  # withheld and delivered as one lump. Exact match wins over the /v1/ prefix.
  location = /v1/verify/stream {
    limit_req zone=metis_api burst=20 nodelay;
    proxy_pass http://metis:8080;
    proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_cache off;
    gzip off;
    chunked_transfer_encoding on;
    proxy_read_timeout 300s;
  }
  # Factory confidence-gate — runs can take up to Metis _RUN_TIMEOUT (300s).
  location = /v1/verify {
    limit_req zone=metis_api burst=40 nodelay;
    proxy_pass http://metis:8080;
    proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
    proxy_connect_timeout 10s; proxy_read_timeout 300s;
  }
  location /v1/ {
    limit_req zone=metis_api burst=40 nodelay;
    proxy_pass http://metis:8080;
    proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
    proxy_connect_timeout 10s; proxy_read_timeout 120s;
  }
  location = /health { proxy_pass http://metis:8080/health; }
  location /aimarket/ {
    limit_req zone=metis_api burst=20 nodelay;
    proxy_pass http://metis:8080; proxy_set_header Host $host; proxy_read_timeout 120s;
  }
}

# --- HTTPS: domain ---
server {
  listen 443 ssl;
  http2 on;
  server_name metis.modelmarket.dev;
  ssl_certificate     /etc/letsencrypt/live/metis.modelmarket.dev/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/metis.modelmarket.dev/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  add_header Strict-Transport-Security "max-age=31536000" always;
  root /usr/share/nginx/html;
  index index.html;
  location / { try_files $uri $uri/ /index.html; }
  # Live cognition trace (SSE) — must NOT buffer, or council runs (8-15s) are
  # withheld and delivered as one lump. Exact match wins over the /v1/ prefix.
  location = /v1/verify/stream {
    limit_req zone=metis_api burst=20 nodelay;
    proxy_pass http://metis:8080;
    proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_cache off;
    gzip off;
    chunked_transfer_encoding on;
    proxy_read_timeout 300s;
  }
  # Factory confidence-gate — runs can take up to Metis _RUN_TIMEOUT (300s).
  location = /v1/verify {
    limit_req zone=metis_api burst=40 nodelay;
    proxy_pass http://metis:8080;
    proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
    proxy_connect_timeout 10s; proxy_read_timeout 300s;
  }
  location /v1/ {
    limit_req zone=metis_api burst=40 nodelay;
    proxy_pass http://metis:8080;
    proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
    proxy_connect_timeout 10s; proxy_read_timeout 120s;
  }
  location = /health { proxy_pass http://metis:8080/health; }
  location /aimarket/ {
    limit_req zone=metis_api burst=20 nodelay;
    proxy_pass http://metis:8080; proxy_set_header Host $host; proxy_read_timeout 120s;
  }
}

# --- SKOPOS (skopos.modelmarket.dev) — HTTP redirect + HTTPS proxy ---
server {
  listen 80;
  server_name skopos.modelmarket.dev;
  location /.well-known/acme-challenge/ { root /var/www/certbot; }
  location / { return 301 https://$host$request_uri; }
}

server {
  listen 443 ssl;
  http2 on;
  server_name skopos.modelmarket.dev;
  ssl_certificate     /etc/letsencrypt/live/skopos.modelmarket.dev/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/skopos.modelmarket.dev/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  add_header Strict-Transport-Security "max-age=31536000" always;

  location = /healthz {
    proxy_pass http://metis-skopos:8502/healthz;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  # Floating AI assistant API (token-authenticated chat + ping) — same-origin so
  # the widget in the /app dashboard reaches it without CORS.
  location /agent/ {
    proxy_pass http://metis-skopos:8502;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization $http_authorization;
    client_max_body_size 256k;
    proxy_connect_timeout 10s;
    proxy_read_timeout 120s;
  }

  location /.well-known/ {
    proxy_pass http://metis-skopos:8502;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location /ai-market/ {
    proxy_pass http://metis-skopos:8502;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location /aimarket/ {
    proxy_pass http://metis-skopos:8502;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 512k;
  }

  # Streamlit dashboard (subpath /app — see STREAMLIT_SERVER_BASEURLPATH=app)
  location = /app {
    return 301 /app/;
  }
  location /app/ {
    proxy_pass http://metis-skopos:8501/app/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 86400;
  }

  # Public marketing landing (static)
  location / {
    root /usr/share/nginx/html/skopos;
    index index.html;
    try_files $uri $uri/ /index.html;
  }
}
