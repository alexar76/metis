# Production overrides — use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

name: metis

services:
  coordinator:
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    # Optional TLS termination via nginx sidecar — uncomment and configure certs:
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.http.routers.metis.rule=Host(`metis.example.com`)"
    #   - "traefik.http.routers.metis.tls=true"

  node-a:
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 8G
        reservations:
          cpus: "1.0"
          memory: 2G
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  node-b:
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 8G
        reservations:
          cpus: "1.0"
          memory: 2G
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  ollama:
    deploy:
      resources:
        limits:
          cpus: "8.0"
          memory: 16G
        reservations:
          cpus: "2.0"
          memory: 4G
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  redis:
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Optional nginx TLS sidecar — mount certs at ./certs/
  # nginx:
  #   image: nginx:1.27-alpine
  #   profiles: [tls]
  #   ports:
  #     - "443:443"
  #   volumes:
  #     - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./certs:/etc/nginx/certs:ro
  #   depends_on:
  #     - coordinator
  #   networks:
  #     - metis-net
  #   read_only: true
  #   cap_drop: [ALL]
  #   security_opt:
  #     - no-new-privileges:true
  #   tmpfs:
  #     - /var/cache/nginx:size=32M
  #     - /var/run:size=8M
